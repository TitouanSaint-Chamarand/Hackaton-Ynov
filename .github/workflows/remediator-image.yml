name: remediator-image

on:
  push:
    branches: [main]
    paths:
      - apps/remediator/**
      - .github/workflows/remediator-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer dependances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/remediator/requirements.txt
          pip install ruff pytest bandit

      - name: Lint remediator (ruff)
        run: ruff check apps/remediator

      - name: Tests remediator (pytest)
        run: pytest apps/remediator/tests -q

      - name: Scan securite code (bandit)
        run: bandit -q -r apps/remediator -x apps/remediator/tests

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/remediator
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/titouansaint-chamarand/hackaton-remediator:latest
            ghcr.io/titouansaint-chamarand/hackaton-remediator:${{ github.sha }}

      - name: Scan image remediator (trivy)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/titouansaint-chamarand/hackaton-remediator:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Rendre le package GHCR public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/hackaton-remediator/visibility \
            -f visibility=public || true
