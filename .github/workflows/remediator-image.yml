name: remediator-image

on:
  push:
    branches: [main]
    paths:
      - apps/remediator/**
      - .github/workflows/remediator-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/remediator
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/titouansaint-chamarand/hackaton-remediator:latest
            ghcr.io/titouansaint-chamarand/hackaton-remediator:${{ github.sha }}

      - name: Rendre le package GHCR public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PUT \
            -H "Accept: application/vnd.github+json" \
            /user/packages/container/hackaton-remediator/visibility \
            -f visibility=public || true
