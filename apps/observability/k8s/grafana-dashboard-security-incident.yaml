apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-security-incident
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  security-incident.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        },
        {
          "name": "DS_LOKI",
          "label": "Loki",
          "type": "datasource",
          "pluginId": "loki",
          "pluginName": "Loki"
        }
      ],
      "title": "Scenario incident securite",
      "uid": "security-incident-demo",
      "schemaVersion": 39,
      "version": 1,
      "timezone": "browser",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "CVE critiques detectees",
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"})",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 0
          }
        },
        {
          "type": "logs",
          "title": "Logs namespace demo",
          "datasource": {
            "type": "loki",
            "uid": "${DS_LOKI}"
          },
          "targets": [
            {
              "expr": "{namespace=\"demo\"}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 14,
            "w": 24,
            "x": 0,
            "y": 10
          }
        }
      ]
    }
