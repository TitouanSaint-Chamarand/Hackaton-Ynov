apiVersion: v1
kind: Namespace
metadata:
  name: remediator
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: remediator
  namespace: remediator
spec:
  schedule: "*/10 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: remediator
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-pull-secret
          containers:
            - name: remediator
              image: ghcr.io/titouansaint-chamarand/hackaton-remediator:e64b76e7e2f950f241fffaba5116a1d7b745d3bc
              imagePullPolicy: IfNotPresent
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              envFrom:
                - secretRef:
                    name: remediator-secrets
              env:
                - name: TARGET_NAMESPACE
                  value: demo
                - name: MANIFEST_PATH
                  value: apps/vulnerable-app/deployment.yaml
                - name: GITHUB_REPO
                  value: TitouanSaint-Chamarand/Hackaton-Ynov
