apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: vulnerable-web }
  template:
    metadata:
      labels: { app: vulnerable-web }
    spec:
      containers:
        - name: web
          image: nginx:1.14          # FAILLE 1 : CVE connues
          securityContext:
            privileged: true          # FAILLE 2
            runAsUser: 0              # FAILLE 3
          ports:
            - containerPort: 80
          # FAILLE 4 : pas de resources.limits
