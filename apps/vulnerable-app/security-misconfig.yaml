apiVersion: v1
kind: ServiceAccount
metadata:
  name: vulnerable-admin
  namespace: demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vulnerable-admin-cluster-admin
subjects:
  - kind: ServiceAccount
    name: vulnerable-admin
    namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
