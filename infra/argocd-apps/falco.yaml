apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: "9.1.0"
    helm:
      values: |
        driver:
          kind: modern_ebpf
        falco:
          webserver:
            enabled: true
            prometheus_metrics_enabled: true
            threadiness: 8
          metrics:
            enabled: true
            interval: 1s
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        serviceMonitor:
          create: true
          interval: 30s
        falcosidekick:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
