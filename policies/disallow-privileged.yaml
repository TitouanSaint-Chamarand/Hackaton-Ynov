apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: no-privileged-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Les conteneurs privilegies sont interdits.
        pattern:
          spec:
            containers:
              - =(securityContext):
                  =(privileged): "false"
